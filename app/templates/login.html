<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site_title }} — Login</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #111;
      --surface: #1c1c1c;
      --border:  #2e2e2e;
      --accent:  #e8a020;
      --text:    #e0e0e0;
      --muted:   #777;
      --danger:  #c0392b;
    }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 32px;
      width: 100%;
      max-width: 320px;
    }
    h1 {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.05em;
      text-align: center;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input[type="text"],
    input[type="password"] {
      display: block;
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #141414;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      margin-bottom: 16px;
      outline: none;
    }
    input:focus {
      border-color: var(--accent);
    }
    button {
      display: block;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #111;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
    }
    button:active {
      opacity: 0.8;
    }
    .error {
      background: rgba(192,57,43,0.15);
      border: 1px solid var(--danger);
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 16px;
      font-size: 0.8rem;
      color: var(--danger);
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>{{ site_title }}</h1>
    <form method="POST" action="/login" autocomplete="on">
      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required autofocus>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
      <button type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>
